<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>廣東話 AI 視覺助手</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* 全黑背景 */
            color: #FFFF00;        /* 高對比黃色字 */
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3; /* 降低相機透明度以突出文字 */
            z-index: 1;
        }

        #status {
            position: relative;
            z-index: 2;
            font-size: 4rem;
            font-weight: bold;
            pointer-events: none;
        }

        .hint {
            position: absolute;
            bottom: 10%;
            z-index: 2;
            font-size: 1.5rem;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border: 2px solid #FFFF00;
        }
    </style>
</head>
<body onclick="toggleAssistant()">

    <video id="webcam" autoplay muted playsinline></video>
    <div id="status">點擊螢幕開始</div>
    <div class="hint">點擊任何地方：開始 / 停止</div>

    <script>
        const video = document.getElementById('webcam');
        const statusDisplay = document.getElementById('status');
        let model = null;
        let isActive = false;
        let lastObject = "";
        let scanInterval = null;

        // 簡單的英譯中字典 (常用物件)
        const dictionary = {
            "person": "人", "bicycle": "單車", "car": "車", "motorcycle": "電單車",
            "airplane": "飛機", "bus": "巴士", "train": "火車", "truck": "貨車",
            "boat": "船", "traffic light": "交通燈", "fire hydrant": "消防栓",
            "stop sign": "停止標誌", "parking meter": "停車收費錶", "bench": "長凳",
            "bird": "雀仔", "cat": "貓", "dog": "狗", "horse": "馬", "sheep": "羊",
            "cow": "牛", "elephant": "象", "bear": "熊", "zebra": "斑馬",
            "giraffe": "長頸鹿", "backpack": "背囊", "umbrella": "遮",
            "handbag": "手袋", "tie": "領帶", "suitcase": "行李箱", "frisbee": "飛碟",
            "skis": "滑雪板", "snowboard": "滑雪板", "sports ball": "波",
            "kite": "風箏", "baseball bat": "棒球棍", "baseball glove": "棒球手套",
            "skateboard": "滑板", "surfboard": "衝浪板", "tennis racket": "網球拍",
            "bottle": "樽", "wine glass": "酒杯", "cup": "杯", "fork": "叉",
            "knife": "刀", "spoon": "匙羹", "bowl": "碗", "banana": "香蕉",
            "apple": "蘋果", "sandwich": "三明治", "orange": "橙", "broccoli": "西蘭花",
            "carrot": "紅蘿蔔", "hot dog": "熱狗", "pizza": "薄餅", "donut": "冬圈",
            "cake": "蛋糕", "chair": "凳", "couch": "梳化", "potted plant": "盆栽",
            "bed": "床", "dining table": "餐檯", "toilet": "廁所", "tv": "電視",
            "laptop": "手提電腦", "mouse": "滑鼠", "remote": "遙控器", "keyboard": "鍵盤",
            "cell phone": "電話", "microwave": "微波爐", "oven": "焗爐", "toaster": "多士爐",
            "sink": "洗手盆", "refrigerator": "雪櫃", "book": "書", "clock": "鐘",
            "vase": "花樽", "scissors": "鉸剪", "teddy bear": "啤啤熊",
            "hair drier": "風筒", "toothbrush": "牙刷"
        };

        async function setup() {
            try {
                statusDisplay.innerText = "載入中...";
                model = await cocoSsd.load();
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
                speak("視覺助手已準備就緒。請點擊螢幕開始。");
                statusDisplay.innerText = "準備就緒";
            } catch (err) {
                speak("相機啟動失敗，請檢查權限。");
                statusDisplay.innerText = "錯誤";
            }
        }

        function toggleAssistant() {
            if (!model) return;
            isActive = !isActive;

            if (isActive) {
                statusDisplay.innerText = "偵測中";
                speak("助手已啟動。");
                startScanning();
            } else {
                statusDisplay.innerText = "已暫停";
                speak("助手已暫停。");
                clearInterval(scanInterval);
            }
        }

        function startScanning() {
            scanInterval = setInterval(async () => {
                if (!isActive) return;
                const predictions = await model.detect(video);
                if (predictions.length > 0) {
                    const englishName = predictions[0].class;
                    const chineseName = dictionary[englishName] || englishName;
                    
                    if (chineseName !== lastObject) {
                        lastObject = chineseName;
                        if (navigator.vibrate) navigator.vibrate(150);
                        statusDisplay.innerText = chineseName;
                        speak("我見到 " + chineseName);
                    }
                }
            }, 1500);
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-HK'; // 設定為廣東話
            msg.rate = 1.0;
            window.speechSynthesis.speak(msg);
        }

        setup();
    </script>
</body>
</html>
